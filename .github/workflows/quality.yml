name: Quality

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run repository lint
        run: |
          chmod +x scripts/lint.sh
          chmod +x scripts/doctor.sh
          ./scripts/lint.sh
